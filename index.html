<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, viewport-fit=cover">
<title>Lista de Compras</title>
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#3F6B4A">
<link rel="apple-touch-icon" href="./icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Compras">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<style>
  :root{
    --paper:#F4EFE3;
    --card:#FFFDF8;
    --ink:#2B2B26;
    --ink-light:#84796A;
    --green:#3F6B4A;
    --green-light:#E6EEE3;
    --amber:#C97A3D;
    --amber-light:#F7E9DA;
    --red:#B5482F;
    --border:#DCD2BD;
    --shadow:rgba(43,38,26,0.14);
    --radius:2px;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(circle at 1px 1px, rgba(43,38,26,0.05) 1px, transparent 0) 0 0/14px 14px,
      var(--paper);
    color:var(--ink);
    font-family:'Inter',sans-serif;
    min-height:100vh;
    padding-bottom:96px;
  }
  @media (prefers-reduced-motion: reduce){
    *{animation-duration:0.001ms !important; transition-duration:0.001ms !important;}
  }

  /* ---------- Tema escuro (versão completa) ---------- */
  body.theme-dark{
    --paper:#1c1b18;
    --card:#252420;
    --ink:#EDE7DA;
    --ink-light:#A79C89;
    --green:#5FA875;
    --green-light:#28352C;
    --amber:#D98F52;
    --amber-light:#3A2E22;
    --red:#E08064;
    --border:#3A362D;
    --shadow:rgba(0,0,0,0.5);
    background:
      radial-gradient(circle at 1px 1px, rgba(255,255,255,0.045) 1px, transparent 0) 0 0/14px 14px,
      var(--paper);
  }
  body.theme-dark input[type=text], body.theme-dark input[type=number],
  body.theme-dark select, body.theme-dark .search-row input, body.theme-dark .add-item-form input,
  body.theme-dark .add-item-form select{
    background:var(--card); color:var(--ink); border-color:var(--border);
  }

  /* ---------- Acessibilidade ---------- */
  button:focus-visible, input:focus-visible, select:focus-visible, textarea:focus-visible{
    outline:2px solid var(--green); outline-offset:2px;
  }

  /* ---------- Header ---------- */
  header.app-header{
    position:sticky; top:0; z-index:30;
    background:var(--paper);
    border-bottom:1px solid var(--border);
    padding:14px 16px 10px;
  }
  .brand{
    display:flex; align-items:baseline; justify-content:space-between; gap:8px;
  }
  .brand h1{
    font-family:'Space Mono', monospace;
    font-weight:700;
    font-size:19px;
    letter-spacing:0.5px;
    margin:0;
    display:flex; align-items:center; gap:8px;
  }
  .brand h1 .dot{color:var(--green); font-size:22px; line-height:0;}
  .icon-btn{
    background:none; border:1px solid var(--border); border-radius:999px;
    width:36px; height:36px; display:flex; align-items:center; justify-content:center;
    cursor:pointer; color:var(--ink); flex-shrink:0;
  }
  .icon-btn:active{background:var(--green-light); border-color:var(--green);}

  .mode-row{
    display:flex; align-items:center; justify-content:space-between; gap:10px; margin-top:12px;
  }
  .mode-switch{
    display:flex; border:1px solid var(--border); border-radius:999px; overflow:hidden; background:var(--card);
  }
  .mode-switch button{
    font-family:'Space Mono',monospace; font-size:11px; padding:7px 13px; border:none;
    background:transparent; color:var(--ink-light); cursor:pointer;
  }
  .mode-switch button.active{background:var(--ink); color:var(--card);}

  .tabs-row{
    display:flex; gap:8px; overflow-x:auto; margin-top:12px; padding-bottom:4px;
    scrollbar-width:none;
  }
  .tabs-row::-webkit-scrollbar{display:none;}
  .tab{
    flex:0 0 auto;
    font-family:'Space Mono', monospace;
    font-size:12px;
    padding:7px 12px;
    border:1px solid var(--border);
    border-radius:999px;
    background:var(--card);
    color:var(--ink-light);
    white-space:nowrap;
    cursor:pointer;
    display:flex; align-items:center; gap:6px;
  }
  .tab.active{
    background:var(--ink); color:var(--card); border-color:var(--ink);
  }
  .tab .rec-mark{font-size:11px;}
  .tab .overdue-dot{font-size:9px; color:var(--red);}
  .tab.add-tab{
    color:var(--green); border-color:var(--green); border-style:dashed;
    background:transparent;
  }

  main{max-width:560px; margin:0 auto; padding:18px 14px 0;}

  /* ---------- Empty state ---------- */
  .empty-state{
    text-align:center; padding:60px 20px; color:var(--ink-light);
  }
  .empty-state .big{font-size:40px; margin-bottom:10px;}
  .empty-state h2{font-family:'Space Mono',monospace; font-size:16px; color:var(--ink); margin:0 0 6px;}
  .empty-state p{font-size:14px; line-height:1.5; margin:0 0 18px;}

  /* ---------- Receipt card ---------- */
  .receipt{
    background:var(--card);
    box-shadow:0 10px 24px -8px var(--shadow);
    transform:rotate(-0.25deg);
    position:relative;
    padding:22px 18px 4px;
    clip-path: polygon(
      0% 8px, 2% 0%, 4% 8px, 6% 0%, 8% 8px, 10% 0%, 12% 8px, 14% 0%, 16% 8px, 18% 0%, 20% 8px, 22% 0%, 24% 8px, 26% 0%, 28% 8px, 30% 0%, 32% 8px, 34% 0%, 36% 8px, 38% 0%, 40% 8px, 42% 0%, 44% 8px, 46% 0%, 48% 8px, 50% 0%, 52% 8px, 54% 0%, 56% 8px, 58% 0%, 60% 8px, 62% 0%, 64% 8px, 66% 0%, 68% 8px, 70% 0%, 72% 8px, 74% 0%, 76% 8px, 78% 0%, 80% 8px, 82% 0%, 84% 8px, 86% 0%, 88% 8px, 90% 0%, 92% 8px, 94% 0%, 96% 8px, 98% 0%, 100% 8px,
      100% 100%,
      98% calc(100% - 8px), 96% 100%, 94% calc(100% - 8px), 92% 100%, 90% calc(100% - 8px), 88% 100%, 86% calc(100% - 8px), 84% 100%, 82% calc(100% - 8px), 80% 100%, 78% calc(100% - 8px), 76% 100%, 74% calc(100% - 8px), 72% 100%, 70% calc(100% - 8px), 68% 100%, 66% calc(100% - 8px), 64% 100%, 62% calc(100% - 8px), 60% 100%, 58% calc(100% - 8px), 56% 100%, 54% calc(100% - 8px), 52% 100%, 50% calc(100% - 8px), 48% 100%, 46% calc(100% - 8px), 44% 100%, 42% calc(100% - 8px), 40% 100%, 38% calc(100% - 8px), 36% 100%, 34% calc(100% - 8px), 32% 100%, 30% calc(100% - 8px), 28% 100%, 26% calc(100% - 8px), 24% 100%, 22% calc(100% - 8px), 20% 100%, 18% calc(100% - 8px), 16% 100%, 14% calc(100% - 8px), 12% 100%, 10% calc(100% - 8px), 8% 100%, 6% calc(100% - 8px), 4% 100%, 2% calc(100% - 8px), 0% 100%
    );
    margin-bottom:18px;
  }
  .receipt-head{
    text-align:center; padding-bottom:14px; border-bottom:1px dashed var(--border);
    margin-bottom:6px;
  }
  .receipt-head .list-name{
    font-family:'Space Mono',monospace; font-weight:700; font-size:18px;
    text-transform:uppercase; letter-spacing:1px; margin:0 0 4px;
    word-break:break-word;
  }
  .receipt-head .list-meta{
    font-size:11px; color:var(--ink-light); display:flex; justify-content:center; gap:10px; flex-wrap:wrap;
  }
  .receipt-head .list-meta .rec-badge{color:var(--green); font-weight:600;}
  .receipt-head .list-meta .overdue-badge{color:var(--red); font-weight:700;}

  .progress-row{
    display:flex; align-items:center; gap:10px; padding:12px 0 10px; border-bottom:1px dashed var(--border);
  }
  .progress-track{
    flex:1; height:6px; background:var(--border); border-radius:99px; overflow:hidden;
  }
  .progress-fill{
    height:100%; background:var(--green); border-radius:99px; transition:width .25s ease;
  }
  .progress-label{
    font-family:'Space Mono',monospace; font-size:11px; color:var(--ink-light); white-space:nowrap;
  }

  .total-row{
    font-family:'Space Mono',monospace; font-size:12px; color:var(--ink-light);
    padding:8px 0; border-bottom:1px dashed var(--border); text-align:right;
  }
  .total-row strong{color:var(--ink);}

  .search-row{padding:10px 0 2px;}
  .search-row input{
    width:100%; font-family:'Inter',sans-serif; font-size:14px; padding:9px 10px;
    border:1px solid var(--border); border-radius:6px; background:#fff; color:var(--ink);
  }

  .category-block{padding-top:12px;}
  .category-title{
    font-family:'Space Mono',monospace; font-size:11px; letter-spacing:1.5px;
    text-transform:uppercase; color:var(--ink-light); margin:0 0 6px;
    display:flex; align-items:center; gap:8px;
  }
  .category-title::after{
    content:''; flex:1; border-bottom:1px dotted var(--border); transform:translateY(-3px);
  }

  .item-row{
    display:flex; align-items:flex-start; gap:8px;
    padding:8px 0;
    border-bottom:1px dotted var(--border);
  }
  .item-row:last-child{border-bottom:none;}
  .check{
    width:22px; height:22px; flex-shrink:0; border:1.5px solid var(--ink-light);
    border-radius:5px; display:flex; align-items:center; justify-content:center;
    cursor:pointer; margin-top:1px; background:var(--card);
  }
  .check svg{width:14px; height:14px; opacity:0; transition:opacity .12s;}
  .item-row.bought .check{background:var(--green); border-color:var(--green);}
  .item-row.bought .check svg{opacity:1; stroke:#fff;}
  .item-main{flex:1; min-width:0;}
  .item-name-row{display:flex; gap:6px; align-items:baseline; flex-wrap:wrap;}
  .item-name{font-size:14.5px; font-weight:500; word-break:break-word;}
  .item-row.bought .item-name{text-decoration:line-through; color:var(--ink-light); font-weight:400;}
  .item-price{font-family:'Space Mono',monospace; font-size:11px; color:var(--green); margin-top:2px;}
  .item-qty{
    font-family:'Space Mono',monospace; font-size:12px; color:var(--ink-light); flex-shrink:0;
    white-space:nowrap; margin-top:2px;
  }
  .drag-handle{
    cursor:grab; touch-action:none; color:var(--ink-light); font-size:17px;
    padding:2px 6px; flex-shrink:0; user-select:none; -webkit-user-select:none;
    display:flex; align-items:center; line-height:1;
  }
  .drag-handle:active{cursor:grabbing;}
  .item-row.dragging{
    opacity:0.45; background:var(--green-light); border-radius:6px;
  }
  body.dragging-active, body.dragging-active *{
    user-select:none !important; -webkit-user-select:none !important;
  }
  .item-edit{
    background:none; border:none; color:var(--ink-light); cursor:pointer; padding:4px;
    flex-shrink:0; font-size:14px; line-height:1; margin-top:1px;
  }
  .item-del{
    background:none; border:none; color:var(--ink-light); cursor:pointer; padding:4px;
    flex-shrink:0; font-size:16px; line-height:1; margin-top:1px;
  }
  .item-del:active{color:var(--red);}

  .add-item-form{
    display:flex; flex-wrap:wrap; gap:8px; padding:14px 0 16px; border-top:1px dashed var(--border); margin-top:8px;
  }
  .add-item-form input, .add-item-form select{
    font-family:'Inter',sans-serif; font-size:14px; padding:9px 10px;
    border:1px solid var(--border); border-radius:6px; background:#fff; color:var(--ink);
  }
  .add-item-form .f-name{flex:1 1 140px; min-width:120px;}
  .add-item-form .f-qty{width:64px;}
  .add-item-form .f-unit{width:78px;}
  .add-item-form .f-cat{flex:1 1 110px; min-width:100px;}
  .add-item-form .f-price{width:84px;}
  .add-item-form button{
    font-family:'Space Mono',monospace; font-weight:700; font-size:13px;
    background:var(--green); color:#fff; border:none; border-radius:6px;
    padding:9px 14px; cursor:pointer; flex-shrink:0;
  }
  .add-item-form button:active{background:#335a3e;}

  .list-actions{
    display:flex; flex-wrap:wrap; gap:8px; margin-bottom:28px;
  }
  .list-actions button{
    flex:1 1 auto;
    font-family:'Space Mono',monospace; font-size:12.5px; font-weight:700;
    padding:11px 10px; border-radius:6px; cursor:pointer;
    border:1px solid var(--border); background:var(--card); color:var(--ink);
    display:flex; align-items:center; justify-content:center; gap:6px;
  }
  .list-actions button.primary{background:var(--ink); color:var(--card); border-color:var(--ink);}
  .list-actions button:active{transform:translateY(1px);}

  /* ---------- FAB ---------- */
  .fab{
    position:fixed; right:18px; bottom:18px; z-index:40;
    width:54px; height:54px; border-radius:50%;
    background:var(--green); color:#fff; border:none;
    box-shadow:0 8px 18px -4px rgba(63,107,74,0.55);
    font-size:26px; display:flex; align-items:center; justify-content:center;
    cursor:pointer;
  }
  .fab:active{transform:scale(0.94);}

  /* ---------- Modal ---------- */
  .modal-overlay{
    position:fixed; inset:0; background:rgba(43,38,26,0.45); z-index:50;
    display:flex; align-items:flex-end; justify-content:center;
  }
  @media (min-width:560px){ .modal-overlay{align-items:center;} }
  .modal{
    background:var(--paper); width:100%; max-width:480px;
    border-radius:16px 16px 0 0; padding:20px 18px 24px; max-height:88vh; overflow-y:auto;
    box-shadow:0 -10px 30px rgba(0,0,0,0.2);
  }
  @media (min-width:560px){ .modal{border-radius:14px; margin:20px;} }
  .modal h2{
    font-family:'Space Mono',monospace; font-size:16px; margin:0 0 4px; text-transform:uppercase; letter-spacing:0.5px;
  }
  .modal p.sub{font-size:13px; color:var(--ink-light); margin:0 0 16px;}
  .field{margin-bottom:14px;}
  .field label{display:block; font-size:12px; font-weight:600; color:var(--ink-light); margin-bottom:5px; text-transform:uppercase; letter-spacing:0.4px;}
  .field input[type=text], .field input[type=number], .field select{
    width:100%; font-family:'Inter',sans-serif; font-size:15px; padding:10px 12px;
    border:1px solid var(--border); border-radius:8px; background:#fff; color:var(--ink);
  }
  .toggle-row{display:flex; align-items:center; justify-content:space-between; gap:10px; padding:10px 0;}
  .toggle-row label{font-size:14px; font-weight:500; margin:0;}
  .switch{position:relative; width:42px; height:24px; flex-shrink:0;}
  .switch input{opacity:0; width:0; height:0;}
  .slider{position:absolute; inset:0; background:var(--border); border-radius:99px; cursor:pointer; transition:.15s;}
  .slider::before{content:''; position:absolute; width:18px; height:18px; left:3px; top:3px; background:#fff; border-radius:50%; transition:.15s;}
  .switch input:checked + .slider{background:var(--green);}
  .switch input:checked + .slider::before{transform:translateX(18px);}
  .seg{display:flex; gap:6px; flex-wrap:wrap;}
  .seg button{
    font-family:'Space Mono',monospace; font-size:12px; padding:7px 11px; border-radius:99px;
    border:1px solid var(--border); background:#fff; cursor:pointer; color:var(--ink-light);
  }
  .seg button.active{background:var(--ink); color:#fff; border-color:var(--ink);}
  .modal-buttons{display:flex; gap:10px; margin-top:18px;}
  .modal-buttons button{
    flex:1; font-family:'Space Mono',monospace; font-weight:700; font-size:13px;
    padding:12px; border-radius:8px; cursor:pointer; border:1px solid var(--border);
    background:#fff; color:var(--ink);
  }
  .modal-buttons button.primary{background:var(--green); color:#fff; border-color:var(--green);}
  .modal-buttons button.danger{background:#fff; color:var(--red); border-color:var(--red);}
  .text-danger-link{
    display:block; width:100%; text-align:center; background:none; border:none;
    color:var(--red); font-family:'Space Mono',monospace; font-size:12px; padding:14px 0 0;
    cursor:pointer; text-decoration:underline;
  }

  .carry-item{
    display:flex; align-items:center; gap:10px; padding:9px 0; border-bottom:1px dotted var(--border);
  }
  .carry-item:last-child{border-bottom:none;}
  .carry-item .ci-name{flex:1; font-size:14px;}
  .carry-item .ci-name small{display:block; color:var(--ink-light); font-size:11px; font-family:'Space Mono',monospace;}
  .carry-toggle{
    font-family:'Space Mono',monospace; font-size:11px; padding:6px 10px; border-radius:6px;
    border:1px solid var(--border); background:#fff; cursor:pointer; color:var(--ink-light);
  }
  .carry-toggle.keep{color:var(--green); border-color:var(--green); background:var(--green-light);}
  .carry-toggle.remove{color:var(--red); border-color:var(--red); background:#FBEAE5;}
  body.theme-dark .carry-toggle.remove{background:#3a201c;}

  .map-options{display:flex; flex-direction:column; gap:10px;}
  .map-option-btn{
    display:flex; align-items:center; gap:12px; padding:13px; border-radius:10px;
    border:1px solid var(--border); background:#fff; cursor:pointer; text-align:left;
  }
  body.theme-dark .map-option-btn{background:var(--card);}
  .map-option-btn .moi{font-size:20px;}
  .map-option-btn .mot strong{display:block; font-size:14px;}
  .map-option-btn .mot span{font-size:12px; color:var(--ink-light);}

  .toast{
    position:fixed; bottom:88px; left:50%; transform:translateX(-50%);
    background:var(--ink); color:var(--card); font-size:13px; padding:10px 16px;
    border-radius:999px; z-index:60; opacity:0; transition:opacity .2s, transform .2s;
    pointer-events:none; white-space:nowrap; font-family:'Space Mono',monospace;
  }
  .toast.show{opacity:1; transform:translateX(-50%) translateY(-4px);}

  .cat-chip-row{display:flex; flex-wrap:wrap; gap:6px; margin-top:10px;}
  .cat-chip{
    font-family:'Space Mono',monospace; font-size:11px; padding:5px 9px; border-radius:99px;
    border:1px solid var(--border); background:#fff; cursor:pointer; color:var(--ink-light);
  }
  .cat-chip.active{background:var(--amber); color:#fff; border-color:var(--amber);}
</style>
</head>
<body>

<header class="app-header">
  <div class="brand">
    <h1><span class="dot">&#9679;</span>Lista de Compras</h1>
    <div style="display:flex; gap:8px;">
      <button class="icon-btn" id="themeToggleBtn" title="Alternar tema" aria-label="Alternar tema" style="display:none;">🌙</button>
      <button class="icon-btn" id="syncBtn" title="Sincronização" aria-label="Sincronização">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 0 1-15.5 6.3L3 16"/><path d="M3 12a9 9 0 0 1 15.5-6.3L21 8"/><path d="M3 21v-5h5"/><path d="M21 3v5h-5"/></svg>
      </button>
      <button class="icon-btn" id="historyBtn" title="Compras finalizadas" aria-label="Compras finalizadas">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 3-6.7L3 8"/><path d="M3 4v4h4"/><path d="M12 7v5l3 3"/></svg>
      </button>
      <button class="icon-btn" id="newListBtn" title="Nova lista" aria-label="Nova lista">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </button>
    </div>
  </div>
  <div class="mode-row">
    <div class="mode-switch" id="modeSwitch" role="group" aria-label="Alternar versão do aplicativo">
      <button type="button" class="mode-btn" data-mode="simple">Resumida</button>
      <button type="button" class="mode-btn" data-mode="full">Completa</button>
    </div>
  </div>
  <div class="tabs-row" id="tabsRow"></div>
</header>

<main id="mainArea"></main>

<button class="fab" id="fabAdd" title="Adicionar item" aria-label="Adicionar item">+</button>
<div class="toast" id="toast" role="status" aria-live="polite"></div>

<script>
/* =================== STORAGE (local) =================== */
const STORAGE_KEY = 'shopping-app-data';
const SYNC_CONFIG_KEY = 'shopping-app-sync-config';

async function loadData(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw) return JSON.parse(raw);
  }catch(e){ /* not found yet ou storage indisponível */ }
  return { lists: [], activeListId: null, finishedLists: [], appMode: 'simple', theme: 'light', itemHistory: {}, updatedAt: 0 };
}
async function saveDataLocal(){
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
  catch(e){ console.error('Erro ao salvar', e); showToast('Não foi possível salvar agora'); }
}
async function saveData(){
  state.updatedAt = Date.now();
  await saveDataLocal();
  scheduleCloudSync();
}

let state = { lists: [], activeListId: null, finishedLists: [], appMode: 'simple', theme: 'light', itemHistory: {}, updatedAt: 0 };

/* =================== FIREBASE / FIRESTORE =================== */

let syncConfig = { ownerId: '', enabled: false };
let syncStatus = 'off'; // off | syncing | synced | error | offline
let unsubscribeSnapshot = null;
let applyingRemoteUpdate = false; // evita loop: ignora o eco do próprio salvamento

async function loadSyncConfig(){
  try{
    const raw = localStorage.getItem(SYNC_CONFIG_KEY);
    if(raw) syncConfig = JSON.parse(raw);
  }catch(e){ /* sem config ainda */ }
}
async function saveSyncConfig(cfg){
  syncConfig = cfg;
  try{ localStorage.setItem(SYNC_CONFIG_KEY, JSON.stringify(syncConfig)); }
  catch(e){ console.error('Erro ao salvar config de sync', e); }
}

function setSyncStatus(s){
  syncStatus = s;
  const btn = document.getElementById('syncBtn');
  if(!btn) return;
  const colors = { off:'var(--ink-light)', syncing:'var(--amber)', synced:'var(--green)', error:'var(--red)', offline:'var(--ink-light)' };
  btn.style.color = colors[s] || 'var(--ink)';
}

// "ownerId" hoje é um código combinado manualmente (ex: nome da família).
// Quando o login (Fase 3) existir, basta trocar esse valor pelo uid do Firebase Auth
// sem mudar a estrutura de dados nem as funções abaixo.
function getDocRef(){
  if(!db || !syncConfig.ownerId) return null;
  return db.collection(COLLECTION_NAME).doc(syncConfig.ownerId);
}

let syncDebounceTimer = null;
function scheduleCloudSync(){
  if(!firebaseReady || !syncConfig.enabled || !syncConfig.ownerId) return;
  if(applyingRemoteUpdate) return; // não reenviar o que acabamos de receber da nuvem
  clearTimeout(syncDebounceTimer);
  syncDebounceTimer = setTimeout(pushToCloud, 1200);
}

async function pushToCloud(){
  const ref = getDocRef();
  if(!ref) return;
  setSyncStatus('syncing');
  try{
    await ref.set({ state, updatedAt: state.updatedAt }, { merge: false });
    setSyncStatus('synced');
  }catch(e){
    console.error('Erro ao sincronizar (envio)', e);
    setSyncStatus('offline');
  }
}

// Escuta em tempo real: assim que qualquer dispositivo salvar, este listener
// dispara sozinho (sem polling, sem precisar tocar em botão nenhum).
function startRealtimeSync(){
  if(unsubscribeSnapshot){ unsubscribeSnapshot(); unsubscribeSnapshot = null; }
  const ref = getDocRef();
  if(!ref) return;
  setSyncStatus('syncing');
  unsubscribeSnapshot = ref.onSnapshot((snap)=>{
    if(!snap.exists){
      // nada na nuvem ainda: este dispositivo envia o que tem localmente
      pushToCloud();
      setSyncStatus('synced');
      return;
    }
    const data = snap.data();
    // ignora o eco da própria escrita (metadata.hasPendingWrites = true = ainda é local)
    if(snap.metadata.hasPendingWrites){ setSyncStatus('synced'); return; }
    if(data && data.state && (data.updatedAt || 0) > (state.updatedAt || 0)){
      applyingRemoteUpdate = true;
      const localAppMode = state.appMode, localTheme = state.theme;
      state = data.state;
      if(!state.appMode) state.appMode = localAppMode || 'simple';
      if(!state.theme) state.theme = localTheme || 'light';
      if(!state.itemHistory) state.itemHistory = {};
      saveDataLocal();
      render();
      showToast('Dados atualizados de outro dispositivo');
      applyingRemoteUpdate = false;
    }
    setSyncStatus('synced');
  }, (err)=>{
    console.error('Erro no listener de sincronização', err);
    setSyncStatus('error');
  });
}

function stopRealtimeSync(){
  if(unsubscribeSnapshot){ unsubscribeSnapshot(); unsubscribeSnapshot = null; }
  setSyncStatus('off');
}

function openSyncModal(){
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  const configPending = !firebaseReady;
  overlay.innerHTML = `
    <div class="modal">
      <h2>Sincronização na nuvem</h2>
      ${configPending ? `<p class="sub" style="color:var(--red);">O Firebase ainda não foi configurado neste arquivo (edite a constante firebaseConfig no código-fonte).</p>` : ''}
      <p class="sub">Combine o mesmo "código de sincronização" em todos os seus dispositivos para que as listas fiquem conectadas entre eles.</p>
      <div class="toggle-row">
        <label for="syncToggle">Sincronização ativa</label>
        <label class="switch"><input type="checkbox" id="syncToggle" ${syncConfig.enabled ? 'checked' : ''} ${configPending ? 'disabled' : ''}><span class="slider"></span></label>
      </div>
      <div class="field">
        <label>Código de sincronização</label>
        <input type="text" id="syncOwnerId" placeholder="ex: familia-silva-9f3a2" value="${escapeHtml(syncConfig.ownerId || '')}" ${configPending ? 'disabled' : ''}>
      </div>
      <div class="modal-buttons">
        <button id="syncCancel">Cancelar</button>
        <button class="primary" id="syncSave" ${configPending ? 'disabled' : ''}>Salvar e sincronizar</button>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);
  overlay.querySelector('#syncCancel').onclick = ()=> overlay.remove();
  const saveBtn = overlay.querySelector('#syncSave');
  if(saveBtn) saveBtn.onclick = async ()=>{
    const cfg = {
      enabled: overlay.querySelector('#syncToggle').checked,
      ownerId: overlay.querySelector('#syncOwnerId').value.trim()
    };
    await saveSyncConfig(cfg);
    overlay.remove();
    if(cfg.enabled && cfg.ownerId){
      showToast('Conectando...');
      startRealtimeSync();
    } else {
      stopRealtimeSync();
      showToast('Configuração salva');
    }
  };
  overlay.addEventListener('click', e=>{ if(e.target === overlay) overlay.remove(); });
}
const DEFAULT_CATEGORIES = ['Hortifruti','Açougue','Mercearia','Limpeza','Higiene','Bebidas','Padaria','Outros'];
const DEFAULT_UNITS = ['','un','kg','g','L','ml','pacote','caixa','dz'];
let currentSearch = '';

function uid(){ return Math.random().toString(36).slice(2,10); }

function getActiveList(){
  return state.lists.find(l => l.id === state.activeListId) || null;
}
function isFullMode(){ return state.appMode === 'full'; }

/* =================== INIT =================== */
async function init(){
  state = await loadData();
  if(!state.lists) state.lists = [];
  if(!state.finishedLists) state.finishedLists = [];
  if(!state.appMode) state.appMode = 'simple';
  if(!state.theme) state.theme = 'light';
  if(!state.itemHistory) state.itemHistory = {};
  if(!state.updatedAt) state.updatedAt = 0;
  if(state.lists.length === 0){
    // primeira vez: cria uma lista de exemplo "Mercado"
    const l = createListObject('Mercado', false, 7);
    state.lists.push(l);
    state.activeListId = l.id;
    await saveData();
  }
  if(!state.activeListId || !getActiveList()){
    state.activeListId = state.lists[0].id;
  }
  render();

  await loadSyncConfig();
  setSyncStatus(syncConfig.enabled ? 'syncing' : 'off');
  if(syncConfig.enabled) startRealtimeSync();

  if('serviceWorker' in navigator){
    navigator.serviceWorker.register('./sw.js').catch(e=> console.warn('Falha ao registrar service worker', e));
  }
}

function createListObject(name, recurring, frequencyDays, baseName){
  return {
    id: uid(),
    name: name,
    baseName: baseName || name,
    recurring: { enabled: !!recurring, frequencyDays: frequencyDays || 7 },
    createdAt: Date.now(),
    location: null, // {type:'auto'} ou {type:'address', value:'...'}
    items: []
  };
}

/* =================== RENDER =================== */
function render(){
  const isFull = isFullMode();
  document.body.classList.toggle('theme-dark', isFull && state.theme === 'dark');
  document.querySelectorAll('#modeSwitch .mode-btn').forEach(b=>{
    b.classList.toggle('active', b.dataset.mode === state.appMode);
  });
  const themeBtn = document.getElementById('themeToggleBtn');
  themeBtn.style.display = isFull ? 'flex' : 'none';
  themeBtn.textContent = state.theme === 'dark' ? '☀️' : '🌙';
  renderTabs();
  renderMain();
}

function renderTabs(){
  const isFull = isFullMode();
  const row = document.getElementById('tabsRow');
  row.innerHTML = '';
  state.lists.forEach(l=>{
    const tab = document.createElement('button');
    tab.className = 'tab' + (l.id === state.activeListId ? ' active' : '');
    const overdue = isFull && l.recurring.enabled && (Date.now() > (l.createdAt + (l.recurring.frequencyDays||7)*86400000));
    tab.innerHTML = (l.recurring.enabled ? '<span class="rec-mark">&#8635;</span> ' : '') +
      (overdue ? '<span class="overdue-dot">&#9679;</span> ' : '') + escapeHtml(l.name);
    tab.onclick = ()=>{ currentSearch=''; state.activeListId = l.id; saveData(); render(); };
    row.appendChild(tab);
  });
  const addTab = document.createElement('button');
  addTab.className = 'tab add-tab';
  addTab.textContent = '+ nova lista';
  addTab.onclick = openNewListModal;
  row.appendChild(addTab);
}

function renderMain(){
  const isFull = isFullMode();
  const main = document.getElementById('mainArea');
  main.innerHTML = '';
  const list = getActiveList();
  if(!list){
    main.innerHTML = `<div class="empty-state">
      <div class="big">🧺</div>
      <h2>Nenhuma lista ainda</h2>
      <p>Crie sua primeira lista de compras para começar a organizar suas idas ao mercado.</p>
    </div>`;
    return;
  }

  const total = list.items.length;
  const bought = list.items.filter(i=>i.bought).length;
  const totalEstimate = list.items.reduce((sum, it)=>{
    const price = parseFloat(it.price);
    if(isNaN(price)) return sum;
    const qty = parseFloat(it.qty);
    return sum + price * (isNaN(qty) ? 1 : qty);
  }, 0);

  const receipt = document.createElement('div');
  receipt.className = 'receipt';

  // head
  const metaParts = [];
  if(list.recurring.enabled) metaParts.push(`<span class="rec-badge">&#8635; recorrente · a cada ${list.recurring.frequencyDays}d</span>`);
  metaParts.push(new Date(list.createdAt).toLocaleDateString('pt-BR'));
  if(isFull){
    const overdue = list.recurring.enabled && (Date.now() > (list.createdAt + (list.recurring.frequencyDays||7)*86400000));
    if(overdue) metaParts.push(`<span class="overdue-badge">&#9888; recorrência atrasada</span>`);
  }

  receipt.innerHTML = `
    <div class="receipt-head">
      <p class="list-name">${escapeHtml(list.name)}</p>
      <div class="list-meta">${metaParts.join(' · ')}</div>
    </div>
    <div class="progress-row">
      <div class="progress-track"><div class="progress-fill" style="width:${total? Math.round(bought/total*100):0}%"></div></div>
      <div class="progress-label">${bought} de ${total} ${total===1?'item':'itens'}</div>
    </div>
    ${isFull ? `<div class="total-row">Total estimado: <strong>${formatPrice(totalEstimate)}</strong></div>` : ''}
    ${isFull ? `<div class="search-row"><input type="text" id="searchInput" placeholder="Buscar item na lista..." aria-label="Buscar item na lista"></div>` : ''}
    ${isFull ? `<div class="cat-chip-row" id="favChipRow"></div>` : ''}
    <div id="categoriesArea"></div>
    <div class="add-item-form" id="addItemForm">
      <input type="text" class="f-name" id="newItemName" placeholder="Item (ex: Tomate)" aria-label="Nome do item"${isFull ? ' list="itemNamesDatalist"' : ''}>
      <input type="text" class="f-qty" id="newItemQty" placeholder="1" aria-label="Quantidade">
      ${isFull ? `<select class="f-unit" id="newItemUnit" aria-label="Unidade">${DEFAULT_UNITS.map(u=>`<option value="${u}">${u===''?'Un.':escapeHtml(u)}</option>`).join('')}</select>` : ''}
      <select class="f-cat" id="newItemCat" aria-label="Categoria"></select>
      ${isFull ? `<input type="text" class="f-price" id="newItemPrice" placeholder="R$" aria-label="Preço estimado">` : ''}
      <button type="button" id="addItemBtn">Add</button>
    </div>
    ${isFull ? `<datalist id="itemNamesDatalist"></datalist>` : ''}
  `;
  main.appendChild(receipt);

  // categorias usadas + dropdown (em branco/"Sem categoria" por padrão)
  const usedCats = Array.from(new Set(list.items.map(i=>i.category))).filter(c=>c);
  const allCats = Array.from(new Set([...DEFAULT_CATEGORIES, ...usedCats]));
  const catSelect = receipt.querySelector('#newItemCat');
  const optNone = document.createElement('option');
  optNone.value = ''; optNone.textContent = 'Sem categoria';
  catSelect.appendChild(optNone);
  allCats.forEach(c=>{
    const opt = document.createElement('option');
    opt.value = c; opt.textContent = c;
    catSelect.appendChild(opt);
  });
  const optOther = document.createElement('option');
  optOther.value = '__nova__'; optOther.textContent = '+ nova categoria';
  catSelect.appendChild(optOther);

  // recursos extras da versão completa: datalist de nomes + favoritos
  if(isFull){
    const datalist = receipt.querySelector('#itemNamesDatalist');
    Object.values(state.itemHistory || {}).forEach(h=>{
      const opt = document.createElement('option');
      opt.value = h.name;
      datalist.appendChild(opt);
    });

    const favRow = receipt.querySelector('#favChipRow');
    const favs = Object.values(state.itemHistory || {}).sort((a,b)=> (b.count||0) - (a.count||0)).slice(0,8);
    favs.forEach(f=>{
      const chip = document.createElement('button');
      chip.type = 'button';
      chip.className = 'cat-chip';
      chip.textContent = '+ ' + f.name;
      chip.title = 'Adicionar rapidamente';
      chip.onclick = ()=> quickAddFromHistory(list, f);
      favRow.appendChild(chip);
    });

    const searchInput = receipt.querySelector('#searchInput');
    searchInput.value = currentSearch;
    searchInput.addEventListener('input', (e)=>{
      currentSearch = e.target.value;
      applySearchFilter(currentSearch);
    });

    receipt.querySelector('#newItemName').addEventListener('input', (e)=>{
      const key = e.target.value.trim().toLowerCase();
      const hist = state.itemHistory && state.itemHistory[key];
      if(!hist) return;
      const unitSel = document.getElementById('newItemUnit');
      const priceInp = document.getElementById('newItemPrice');
      if(unitSel && !unitSel.value) unitSel.value = hist.unit || '';
      if(catSelect && !catSelect.value && hist.category){
        const opt = Array.from(catSelect.options).find(o=>o.value===hist.category);
        if(opt) catSelect.value = hist.category;
      }
      if(priceInp && !priceInp.value && hist.price != null) priceInp.value = hist.price;
    });
  }

  // render items grouped by category, pending first then bought within group; bought items pushed to bottom overall via sort
  const catArea = receipt.querySelector('#categoriesArea');
  const grouped = {};
  list.items.forEach(it=>{
    if(!grouped[it.category]) grouped[it.category] = [];
    grouped[it.category].push(it);
  });
  Object.keys(grouped).forEach(cat=>{
    grouped[cat].sort((a,b)=> (a.bought === b.bought) ? 0 : (a.bought ? 1 : -1));
  });

  if(total === 0){
    catArea.innerHTML = `<p style="color:var(--ink-light); font-size:13px; padding:14px 0;">Sua lista está vazia. Adicione itens abaixo.</p>`;
  } else {
    Object.keys(grouped).sort((a,b)=>{
      if(a === '') return -1;
      if(b === '') return 1;
      return a.localeCompare(b, 'pt-BR');
    }).forEach(cat=>{
      const block = document.createElement('div');
      block.className = 'category-block';
      const catLabel = cat === '' ? 'Sem categoria' : cat;
      block.innerHTML = `<p class="category-title">${escapeHtml(catLabel)}</p>`;
      grouped[cat].forEach(item=>{
        block.appendChild(renderItemRow(item, list, isFull));
      });
      catArea.appendChild(block);
    });
  }

  if(isFull && currentSearch) applySearchFilter(currentSearch);

  // add item handlers
  receipt.querySelector('#addItemBtn').onclick = ()=> handleAddItem(list, catSelect);
  receipt.querySelector('#newItemName').addEventListener('keydown', e=>{
    if(e.key === 'Enter') handleAddItem(list, catSelect);
  });
  catSelect.addEventListener('change', ()=>{
    if(catSelect.value === '__nova__'){
      const name = prompt('Nome da nova categoria:');
      if(name && name.trim()){
        const opt = document.createElement('option');
        opt.value = name.trim(); opt.textContent = name.trim();
        catSelect.insertBefore(opt, optOther);
        catSelect.value = name.trim();
      } else {
        catSelect.value = '';
      }
    }
  });

  // action buttons
  const actions = document.createElement('div');
  actions.className = 'list-actions';
  actions.innerHTML = `
    <button id="mapBtn">📍 Ver no mapa</button>
    <button id="pdfBtn">🧾 Gerar PDF</button>
    ${isFull ? `<button id="shareBtn">🔗 Compartilhar</button>` : ''}
    <button id="recurBtn">${list.recurring.enabled ? '🔁 Recorrência: ativa' : '🔁 Recorrência'}</button>
    ${isFull ? `<button id="editListBtn">✎ Editar lista</button>` : ''}
    <button class="primary" id="finishBtn">✓ Finalizar compra</button>
  `;
  main.appendChild(actions);

  actions.querySelector('#mapBtn').onclick = ()=> openMapModal(list);
  actions.querySelector('#pdfBtn').onclick = ()=> generatePdf(list);
  actions.querySelector('#recurBtn').onclick = ()=> openRecurringSettingsModal(list);
  actions.querySelector('#finishBtn').onclick = ()=> openFinishModal(list);
  if(isFull){
    actions.querySelector('#shareBtn').onclick = ()=> shareListAsText(list);
    actions.querySelector('#editListBtn').onclick = ()=> openEditListModal(list);
  }

    receipt.querySelector('#newItemName').focus();
    receipt.scrollIntoView({behavior:'smooth', block:'end'});
  };
}

function applySearchFilter(query){
  const q = (query || '').trim().toLowerCase();
  document.querySelectorAll('.category-block').forEach(block=>{
    let anyVisible = false;
    block.querySelectorAll('.item-row').forEach(row=>{
      const match = !q || (row.dataset.name || '').includes(q);
      row.style.display = match ? '' : 'none';
      if(match) anyVisible = true;
    });
    block.style.display = anyVisible ? '' : 'none';
  });
}

function renderItemRow(item, list, isFull){
  const row = document.createElement('div');
  row.className = 'item-row' + (item.bought ? ' bought' : '');
  row.dataset.name = item.name.toLowerCase();
  row.dataset.id = item.id;
  row.dataset.category = item.category || '';
  row.dataset.bought = String(!!item.bought);
  const qtyDisplay = item.unit ? `${escapeHtml(String(item.qty))} ${escapeHtml(item.unit)}` : escapeHtml(String(item.qty));
  const showPrice = isFull && item.price != null && item.price !== '' && !isNaN(item.price);
  row.innerHTML = `
    <button class="check" aria-label="Marcar como comprado">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 12 9 18 20 6"/></svg>
    </button>
    <div class="item-main">
      <div class="item-name-row">
        <span class="item-name">${escapeHtml(item.name)}</span>
      </div>
      ${showPrice ? `<div class="item-price">${formatPrice(item.price)}</div>` : ''}
    </div>
    <span class="item-qty">${qtyDisplay}</span>
    ${isFull ? `
      <span class="drag-handle" aria-hidden="true" title="Arraste para reordenar">⠿</span>
      <button class="item-edit" aria-label="Editar item">✎</button>
    ` : ''}
    <button class="item-del" aria-label="Remover item">&times;</button>
  `;
  row.querySelector('.check').onclick = ()=>{
    item.bought = !item.bought;
    saveData(); render();
  };
  row.querySelector('.item-del').onclick = ()=>{
    const doDelete = ()=>{ list.items = list.items.filter(i=>i.id !== item.id); saveData(); render(); };
    if(isFull){
      openConfirmModal('Remover item', `Remover "${item.name}" da lista?`, 'Remover', doDelete, true);
    } else {
      doDelete();
    }
  };
  if(isFull){
    row.querySelector('.item-edit').onclick = ()=> openEditItemModal(item, list);
    row.querySelector('.drag-handle').addEventListener('pointerdown', (e)=> startItemDrag(e, row, list));
  }
  return row;
}

/* =================== ARRASTAR PARA REORDENAR =================== */
function startItemDrag(e, row, list){
  e.preventDefault();
  const category = row.dataset.category;
  const bought = row.dataset.bought;
  row.classList.add('dragging');
  document.body.classList.add('dragging-active');

  function onMove(ev){
    const pointX = ev.clientX, pointY = ev.clientY;
    row.style.pointerEvents = 'none';
    const elAtPoint = document.elementFromPoint(pointX, pointY);
    row.style.pointerEvents = '';
    const targetRow = elAtPoint ? elAtPoint.closest('.item-row') : null;
    if(!targetRow || targetRow === row) return;
    if(targetRow.dataset.category !== category || targetRow.dataset.bought !== bought) return;
    const rect = targetRow.getBoundingClientRect();
    const before = (pointY - rect.top) < rect.height / 2;
    targetRow.parentNode.insertBefore(row, before ? targetRow : targetRow.nextSibling);
  }

  function onUp(){
    row.classList.remove('dragging');
    document.body.classList.remove('dragging-active');
    document.removeEventListener('pointermove', onMove);
    document.removeEventListener('pointerup', onUp);
    document.removeEventListener('pointercancel', onUp);
    commitItemOrder(list);
  }

  document.addEventListener('pointermove', onMove);
  document.addEventListener('pointerup', onUp);
  document.addEventListener('pointercancel', onUp);
}

function commitItemOrder(list){
  const orderedIds = Array.from(document.querySelectorAll('#categoriesArea .item-row')).map(r=>r.dataset.id);
  const byId = {};
  list.items.forEach(i=> byId[i.id] = i);
  const reordered = orderedIds.map(id=>byId[id]).filter(Boolean);
  // segurança: inclui qualquer item que não tenha sido encontrado no DOM (ex.: filtrado pela busca)
  list.items.forEach(i=>{ if(!reordered.includes(i)) reordered.push(i); });
  list.items = reordered;
  saveData();
  render();
}

function updateItemHistory(item){
  if(!state.itemHistory) state.itemHistory = {};
  const key = (item.name || '').trim().toLowerCase();
  if(!key) return;
  const existing = state.itemHistory[key] || { count: 0 };
  state.itemHistory[key] = {
    name: item.name.trim(),
    category: item.category,
    unit: item.unit || '',
    price: (item.price !== undefined && item.price !== null && item.price !== '' && !isNaN(item.price)) ? item.price : (existing.price != null ? existing.price : null),
    count: (existing.count || 0) + 1,
    lastUsed: Date.now()
  };
}

function quickAddFromHistory(list, fav){
  const item = { id: uid(), name: fav.name, qty: '1', unit: fav.unit || '', category: fav.category || '', price: (fav.price != null ? fav.price : null), bought:false };
  list.items.push(item);
  updateItemHistory(item);
  saveData(); render();
  showToast(fav.name + ' adicionado');
}

function handleAddItem(list, catSelect){

  const qty = qtyInput.value.trim() || '1';
  const category = catSelect.value === '__nova__' ? '' : catSelect.value;
  const unit = unitSelect ? unitSelect.value : '';
  const priceRaw = priceInput ? priceInput.value.trim() : '';
  const price = priceRaw ? parseFloat(priceRaw.replace(',', '.')) : null;
  const item = { id: uid(), name, qty, unit, category, price: (price != null && !isNaN(price)) ? price : null, bought:false };
  list.items.push(item);
  updateItemHistory(item);
  saveData();
  nameInput.value = '';
  qtyInput.value = '';
  if(unitSelect) unitSelect.value = '';
  if(priceInput) priceInput.value = '';
  render();
  setTimeout(()=>{

    if(el) el.focus();
  }, 30);
}

/* =================== ARQUIVAR / RENOVAR =================== */
function archiveList(list){
  state.lists = state.lists.filter(l=>l.id !== list.id);
  const snapshot = JSON.parse(JSON.stringify(list));
  snapshot.finishedAt = Date.now();
  state.finishedLists.unshift(snapshot);
  if(state.activeListId === list.id){
    state.activeListId = state.lists.length ? state.lists[0].id : null;
  }
}

function pad2(n){ return String(n).padStart(2,'0'); }

function nextRecurrenceName(list){
  const base = list.baseName || list.name;
  const next = new Date(Date.now() + (list.recurring.frequencyDays || 7) * 24 * 60 * 60 * 1000);
  return { base, label: `${base} ${pad2(next.getDate())}/${pad2(next.getMonth()+1)}` };
}

function autoRenewRecurringList(list){
  const { base, label } = nextRecurrenceName(list);
  const newList = createListObject(label, true, list.recurring.frequencyDays, base);
  newList.items = list.items.map(it=> ({ id: uid(), name: it.name, qty: it.qty, unit: it.unit||'', category: it.category, price: (it.price!=null?it.price:null), bought:false }));
  newList.location = list.location || null;
  return newList;
}

function reactivateFinishedList(id, mode){
  const idx = state.finishedLists.findIndex(l=>l.id===id);
  if(idx === -1) return;
  const [snapshot] = state.finishedLists.splice(idx,1);
  const sourceItems = mode === 'pending' ? snapshot.items.filter(i=>!i.bought) : snapshot.items;
  const newList = createListObject(snapshot.name, snapshot.recurring.enabled, snapshot.recurring.frequencyDays, snapshot.baseName);
  newList.location = snapshot.location || null;
  newList.items = sourceItems.map(it=> ({ id: uid(), name: it.name, qty: it.qty, unit: it.unit||'', category: it.category, price: (it.price!=null?it.price:null), bought: false }));
  state.lists.push(newList);
  state.activeListId = newList.id;
  saveData();
  render();
  showToast('Lista reativada');
}

function openFinishedDetailModal(id, mode){
  const list = state.finishedLists.find(l=>l.id===id);
  if(!list){ showToast('Esta compra não está mais no histórico'); return; }
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';

  if(mode === 'choose'){
    const total = list.items.length;
    const pendingCount = list.items.filter(i=>!i.bought).length;
    overlay.innerHTML = `
      <div class="modal">
        <h2>Reativar lista</h2>
        <p class="sub">Quais itens devem voltar para "${escapeHtml(list.name)}"?</p>
        <div class="map-options">
          <button class="map-option-btn" id="reAll">
            <span class="moi">📦</span>
            <span class="mot"><strong>Todos os itens</strong><span>${total} ${total===1?'item':'itens'}, todos desmarcados</span></span>
          </button>
          <button class="map-option-btn" id="rePending">
            <span class="moi">📝</span>
            <span class="mot"><strong>Somente não comprados</strong><span>${pendingCount} ${pendingCount===1?'item':'itens'} ainda sem check</span></span>
          </button>
        </div>
        <div class="modal-buttons">
          <button id="reBack">Voltar</button>
        </div>
      </div>`;
    document.body.appendChild(overlay);
    overlay.querySelector('#reBack').onclick = ()=>{ overlay.remove(); openFinishedDetailModal(id); };
    overlay.querySelector('#reAll').onclick = ()=>{ overlay.remove(); reactivateFinishedList(id, 'all'); };
    overlay.querySelector('#rePending').onclick = ()=>{ overlay.remove(); reactivateFinishedList(id, 'pending'); };
    overlay.addEventListener('click', e=>{ if(e.target === overlay) overlay.remove(); });
    return;
  }

  const bought = list.items.filter(i=>i.bought).length;
  const total = list.items.length;
  const date = new Date(list.finishedAt).toLocaleDateString('pt-BR');

  const grouped = {};
  list.items.forEach(it=>{
    if(!grouped[it.category]) grouped[it.category] = [];
    grouped[it.category].push(it);
  });
  const catsSorted = Object.keys(grouped).sort((a,b)=>{
    if(a === '') return -1;
    if(b === '') return 1;
    return a.localeCompare(b, 'pt-BR');
  });

  let itemsHtml = total === 0 ? '<p style="color:var(--ink-light); font-size:13px;">Esta lista não tinha itens.</p>' : '';
  catsSorted.forEach(cat=>{
    itemsHtml += `<p class="category-title" style="margin-top:14px;">${escapeHtml(cat === '' ? 'Sem categoria' : cat)}</p>`;

      const qtyDisplay = it.unit ? `${escapeHtml(String(it.qty))} ${escapeHtml(it.unit)}` : escapeHtml(String(it.qty));
      itemsHtml += `
        <div class="item-row${it.bought ? ' bought' : ''}">

            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 12 9 18 20 6"/></svg>

          <div class="item-main"><span class="item-name">${escapeHtml(it.name)}</span></div>
          <span class="item-qty">${qtyDisplay}</span>
        </div>`;
    });
  });

  overlay.innerHTML = `
    <div class="modal">
      <h2>${escapeHtml(list.name)}</h2>
      <p class="sub">Finalizada em ${date} · ${bought}/${total} itens comprados</p>
      <div>${itemsHtml}</div>
      <div class="modal-buttons">
        <button id="fdClose">Fechar</button>

      </div>
    </div>`;

  overlay.querySelector('#fdClose').onclick = ()=> overlay.remove();
  overlay.querySelector('#fdReactivate').onclick = ()=>{
    overlay.remove();
    openFinishedDetailModal(id, 'choose');
  };
  overlay.addEventListener('click', e=>{ if(e.target === overlay) overlay.remove(); });
}

/* =================== FINALIZAR COMPRA =================== */
function openFinishModal(list){
  if(list.recurring.enabled){
    openRecurringFinishModal(list);
    return;
  }

  const pending = list.items.filter(i=>!i.bought);
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';

  if(pending.length === 0){
    overlay.innerHTML = `
      <div class="modal">
        <h2>Finalizar compra</h2>
        <p class="sub">Todos os itens foram comprados. Esta compra sairá das suas listas ativas. Deseja iniciar uma nova lista agora?</p>
        <div class="modal-buttons">
          <button id="fCancel">Apenas finalizar</button>
          <button class="primary" id="fNew">Finalizar e criar nova lista</button>
        </div>
      </div>`;
    document.body.appendChild(overlay);
    overlay.querySelector('#fCancel').onclick = ()=>{
      archiveList(list);
      saveData();
      overlay.remove();
      render();
      showToast('Compra finalizada');
    };
    overlay.querySelector('#fNew').onclick = ()=>{
      archiveList(list);
      saveData();
      overlay.remove();
      render();
      openNewListModal([]);
    };
    return;
  }

  const keepState = {};
  pending.forEach(i=> keepState[i.id] = true);

  overlay.innerHTML = `
    <div class="modal">
      <h2>Finalizar compra</h2>
      <p class="sub">Esta compra sairá das suas listas ativas. Ainda há ${pending.length} ${pending.length===1?'item não comprado':'itens não comprados'} — eles podem iniciar uma nova lista. Toque para retirar algum item.</p>
      <div id="carryArea"></div>
      <div class="modal-buttons">
        <button id="fCancel">Cancelar</button>
        <button class="primary" id="fCreate">Finalizar compra</button>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);
  const carryArea = overlay.querySelector('#carryArea');
  pending.forEach(item=>{
    const row = document.createElement('div');
    row.className = 'carry-item';
    const catLabel = item.category ? item.category : 'Sem categoria';
    row.innerHTML = `
      <div class="ci-name">${escapeHtml(item.name)}<small>${escapeHtml(catLabel)} · ${escapeHtml(String(item.qty))}</small></div>
      <button class="carry-toggle keep" data-id="${item.id}">Manter</button>
    `;
    const btn = row.querySelector('.carry-toggle');
    btn.onclick = ()=>{
      keepState[item.id] = !keepState[item.id];
      if(keepState[item.id]){ btn.textContent='Manter'; btn.className='carry-toggle keep'; }
      else { btn.textContent='Retirado'; btn.className='carry-toggle remove'; }
    };
    carryArea.appendChild(row);
  });

  overlay.querySelector('#fCancel').onclick = ()=> overlay.remove();
  overlay.querySelector('#fCreate').onclick = ()=>{
    const toCarry = pending.filter(i=> keepState[i.id]).map(i=>({name:i.name, qty:i.qty, unit:i.unit||'', category:i.category, price:(i.price!=null?i.price:null)}));
    archiveList(list);
    saveData();
    overlay.remove();
    render();
    if(toCarry.length){
      openNewListModal(toCarry);
    } else {
      showToast('Compra finalizada');
    }
  };
}

  overlay.querySelector('#fCancel').onclick = ()=> overlay.remove();
  overlay.querySelector('#fConfirm').onclick = ()=>{
    const newList = autoRenewRecurringList(list);
    archiveList(list);
    state.lists.push(newList);
    state.activeListId = newList.id;
    saveData();
    overlay.remove();
    render();
    showToast('Nova lista criada: ' + newList.name);
  };
}

/* =================== COMPARTILHAR COMO TEXTO =================== */
function buildShareText(list){
  const lines = [];
  lines.push(list.name.toUpperCase());
  lines.push(new Date(list.createdAt).toLocaleDateString('pt-BR'));
  lines.push('');
  const grouped = {};
  list.items.forEach(it=>{
    if(!grouped[it.category]) grouped[it.category] = [];
    grouped[it.category].push(it);
  });
  Object.keys(grouped).sort((a,b)=>{
    if(a === '') return -1;
    if(b === '') return 1;
    return a.localeCompare(b, 'pt-BR');
  }).forEach(cat=>{
    lines.push(`— ${cat === '' ? 'Sem categoria' : cat} —`);
    grouped[cat].forEach(it=>{
      const mark = it.bought ? '[x]' : '[ ]';
      const qtyPart = it.unit ? `${it.qty}${it.unit}` : `${it.qty}x`;
      lines.push(`${mark} ${qtyPart} ${it.name}`);
    });
    lines.push('');
  });
  return lines.join('\n').trim();
}

async function shareListAsText(list){
  const text = buildShareText(list);
  if(navigator.share){
    try{
      await navigator.share({ title: list.name, text });
      return;
    }catch(e){ /* usuário cancelou ou falhou; segue para cópia */ }
  }
  try{
    await navigator.clipboard.writeText(text);
    showToast('Lista copiada para a área de transferência');
  }catch(e){
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.focus(); ta.select();
    try{
      document.execCommand('copy');
      showToast('Lista copiada para a área de transferência');
    }catch(err){
      showToast('Não foi possível copiar automaticamente');
    }
    ta.remove();
  }
}

/* =================== MAPA =================== */
function openMapModal(list){
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `
    <div class="modal">
      <h2>Ver no mapa</h2>
      <p class="sub">Encontre um mercado para a lista "${escapeHtml(list.name)}".</p>
      <div class="map-options">
        <button class="map-option-btn" id="mapAuto">
          <span class="moi">📍</span>
          <span class="mot"><strong>Usar minha localização atual</strong><span>Buscar mercados próximos de onde você está</span></span>
        </button>
        <button class="map-option-btn" id="mapAddr">
          <span class="moi">🗺️</span>
          <span class="mot"><strong>Definir um local específico</strong><span>Calcular rota até um endereço ou mercado</span></span>
        </button>
      </div>
      <div class="field" id="addrField" style="display:none; margin-top:14px;">
        <label>Endereço ou nome do mercado</label>
        <input type="text" id="addrInput" placeholder="Ex: Supermercado Extra, Rua X, 123">
      </div>
      <div class="modal-buttons" id="addrButtons" style="display:none;">
        <button id="addrCancel">Voltar</button>
        <button class="primary" id="addrGo">Calcular rota</button>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);

  overlay.querySelector('#mapAuto').onclick = ()=>{
    showToast('Buscando sua localização...');
    if(!navigator.geolocation){
      window.open('https://www.google.com/maps/search/mercado+perto+de+mim', '_blank');
      overlay.remove();
      return;
    }
    navigator.geolocation.getCurrentPosition(
      (pos)=>{
        const { latitude, longitude } = pos.coords;
        const url = `https://www.google.com/maps/search/mercado/@${latitude},${longitude},15z`;
        window.open(url, '_blank');
        overlay.remove();
      },
      ()=>{
        window.open('https://www.google.com/maps/search/mercado+perto+de+mim', '_blank');
        overlay.remove();
      },
      { timeout: 8000 }
    );
  };

  overlay.querySelector('#mapAddr').onclick = ()=>{
    overlay.querySelector('#addrField').style.display = 'block';
    overlay.querySelector('#addrButtons').style.display = 'flex';
    overlay.querySelector('.map-options').style.display = 'none';
    overlay.querySelector('#addrInput').focus();
  };
  overlay.querySelector('#addrCancel').onclick = ()=>{
    overlay.querySelector('#addrField').style.display = 'none';
    overlay.querySelector('#addrButtons').style.display = 'none';
    overlay.querySelector('.map-options').style.display = 'flex';
  };
  overlay.querySelector('#addrGo').onclick = ()=>{
    const addr = overlay.querySelector('#addrInput').value.trim();
    if(!addr){ overlay.querySelector('#addrInput').focus(); return; }
    list.location = { type:'address', value: addr };
    saveData();
    const dest = encodeURIComponent(addr);
    const url = `https://www.google.com/maps/dir/?api=1&destination=${dest}&travelmode=driving`;
    window.open(url, '_blank');
    overlay.remove();
  };

  overlay.addEventListener('click', e=>{ if(e.target === overlay) overlay.remove(); });
}

/* =================== PDF =================== */
function generatePdf(list){
  if(!window.jspdf){ showToast('Erro ao carregar gerador de PDF'); return; }
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit:'pt', format:[300, 600] });
  let y = 36;
  doc.setFont('courier','bold');
  doc.setFontSize(15);
  doc.text(list.name.toUpperCase(), 150, y, { align:'center' });
  y += 18;
  doc.setFont('courier','normal');
  doc.setFontSize(9);
  doc.text(new Date(list.createdAt).toLocaleDateString('pt-BR'), 150, y, { align:'center' });
  y += 6;
  doc.setLineDashPattern([2,2], 0);
  doc.line(20, y, 280, y);
  y += 18;

  const grouped = {};
  list.items.forEach(it=>{
    if(!grouped[it.category]) grouped[it.category] = [];
    grouped[it.category].push(it);
  });

  doc.setFontSize(10);
  Object.keys(grouped).sort((a,b)=>{
    if(a === '') return -1;
    if(b === '') return 1;
    return a.localeCompare(b, 'pt-BR');
  }).forEach(cat=>{
    doc.setFont('courier','bold');
    doc.text((cat === '' ? 'SEM CATEGORIA' : cat.toUpperCase()), 20, y);
    y += 14;
    doc.setFont('courier','normal');
    grouped[cat].forEach(item=>{
      const mark = item.bought ? '[x]' : '[ ]';
      const qtyPart = item.unit ? `${item.qty}${item.unit}` : `${item.qty}x`;
      const line = `${mark} ${qtyPart}  ${item.name}`;
      doc.text(line.length > 44 ? line.slice(0,44) : line, 26, y);
      y += 14;
      if(y > 560){ doc.addPage([300,600]); y = 36; }
    });
    y += 6;
  });

  y += 4;
  doc.setLineDashPattern([2,2], 0);
  doc.line(20, y, 280, y);
  y += 16;
  const bought = list.items.filter(i=>i.bought).length;
  doc.setFont('courier','bold');
  doc.text(`TOTAL: ${bought}/${list.items.length} itens`, 150, y, { align:'center' });

  doc.save(`${list.name.replace(/[^a-z0-9]+/gi,'-').toLowerCase() || 'lista'}.pdf`);
  showToast('PDF gerado');
}

/* =================== UTIL =================== */
function escapeHtml(str){
  return String(str).replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}
function formatPrice(v){
  const n = typeof v === 'number' ? v : parseFloat(v);
  if(isNaN(n)) return 'R$ 0,00';
  return n.toLocaleString('pt-BR', { style:'currency', currency:'BRL' });
}
let toastTimer;
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=> t.classList.remove('show'), 2200);
}

init();
</script>
